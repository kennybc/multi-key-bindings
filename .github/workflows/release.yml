name: Release all versions

permissions:
  contents: write

on:
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.set.outputs.branches }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set
        run: |
          BRANCHES=$(git branch -r | sed 's|origin/||' | grep -vE 'main|HEAD' | jq -R -s -c 'split(" ") | map(select(length > 0))')
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "Branches: $BRANCHES"

  build:
    needs: discover
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.discover.outputs.branches) }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract version
        id: version
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "mod_version=$MOD_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $MOD_VERSION"

      - name: Create tag if needed
        run: |
          if ! git ls-remote --tags origin | grep -q "refs/tags/${{ steps.version.outputs.mod_version }}"; then
            git tag "${{ steps.version.outputs.mod_version }}"
            git push origin "${{ steps.version.outputs.mod_version }}"
          fi

      - name: Extract changelog
        id: changelog
        run: |
          MOD_ONLY=$(echo "${{ steps.version.outputs.mod_version }}" | cut -d+ -f1)
          CHANGELOG=$(awk "/^## $MOD_ONLY /{flag=1;next}/^## /{flag=0}flag" CHANGELOG.md | tail -n +2)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release for Minecraft ${{ matrix.branch }}"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release if needed
        run: |
          if ! gh release view "${{ steps.version.outputs.mod_version }}" >/dev/null 2>&1; then
            gh release create "${{ steps.version.outputs.mod_version }}" \
              --title "Release ${{ steps.version.outputs.mod_version }}" \
              --notes "${{ steps.changelog.outputs.changelog }}"
          fi

      - name: Skip if JAR already exists
        id: skip
        run: |
          if gh release view "${{ steps.version.outputs.mod_version }}" --json assets -q '.assets[].name' | grep -q '\.jar$'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.skip.outputs.skip != 'true'
        run: bash ./gradlew build --no-daemon --parallel --build-cache

      - name: Upload jar
        if: steps.skip.outputs.skip != 'true'
        run: |
          JAR_PATH=$(ls build/libs/*"${{ steps.version.outputs.mod_version }}"*.jar | grep -v 'sources' | head -n1)
          if [ -z "$JAR_PATH" ]; then
            echo "No JAR found"
            exit 1
          fi
          gh release upload "${{ steps.version.outputs.mod_version }}" "$JAR_PATH" --clobber